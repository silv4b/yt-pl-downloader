name: Build Linux

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: |
          uv sync --frozen

      - name: Build Linux Executable
        run: |
          uv run pyinstaller --onefile --name yt-pl-downloader-linux main.py
          mkdir -p release_assets
          mv dist/yt-pl-downloader-linux release_assets/
          chmod +x release_assets/yt-pl-downloader-linux

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: release_assets/yt-pl-downloader-linux
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.TOKEN_REPO_ACTION }}
