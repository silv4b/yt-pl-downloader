name: Build Windows

on:
    push:
        tags:
            - "v*"

jobs:
    build:
        runs-on: windows-latest
        permissions:
            contents: write

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.12"

            - name: Install uv
              uses: astral-sh/setup-uv@v3

            - name: Install dependencies
              run: |
                  uv sync --frozen

            - name: Build Windows Executable
              run: |
                  uv run pyinstaller --onefile `
                    --name yt-pl-downloader-win `
                    --collect-all yt_dlp `
                    --collect-all rich `
                    --hidden-import inquirer `
                    --hidden-import yaml `
                    --hidden-import readchar `
                    --copy-metadata readchar `
                    --copy-metadata inquirer `
                    main.py
                  mkdir release_assets
                  move dist\yt-pl-downloader-win.exe release_assets\

            - name: Upload to Release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ github.ref_name }}
                  files: release_assets/yt-pl-downloader-win.exe
                  draft: false
              env:
                  GITHUB_TOKEN: ${{ secrets.TOKEN_REPO_ACTION }}
